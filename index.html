        if(recording&&S.hum)tr+=(Math.random()*2-1)*S.hum*0.12;
        if(tr<t0)tr=t0;
        /* monitor exactly where playback will put it: groove included, full
           strength — playback applies the same groove to the stored note */
        const heard=tr+grooveOff(pi,tr);
        at=Math.max(at,gridTime(heard));
        if(S.layer===1)rPend[c]={pi,ts:tr,midi};   // retro memory hears everything
        if(recording){
          if(lane.auto&&!lane._cap&&!lane.events.length){
            if(CFG.listen)startCapture(lane,tr);
            else{lane.unit='B';lane.count=DEFLENS[CFG.defLen];lane.auto=false;}
          }
          const qt=lane._cap?Math.max(0,tr-lane._cap.t0):fmod(tr-editAnchor(),lane.len);
          // qt stored straight (groove is a playback layer); ts = where it actually sounds
          pend[c]={t0,sweep:t0,ts:heard,bornAt:performance.now(),lane:pi,qt,midi};
        }
      }
    }
    liveV[c]=engine.trigger(at,pi,midi,0.9);
    if(S.layer>=2)S.prepFocus=engine.lastMidi[pi];   // last played note = per-note focus (any channel)
    dirty=true; return;
  }
});

let djHeld={},djLatch={},djAuto={},djRecStart={};
function djPress(k,shift){        // shared pad logic: tap on a latched pad unlatches it
  if(shift){if(djLatch[k])delete djLatch[k];else djLatch[k]=1;}
  else if(djLatch[k])delete djLatch[k];
  else djHeld[k]=1;
  djApply();
}
function djApply(silent){
  const keys=[...new Set([...Object.keys(djLatch),...Object.keys(djHeld),...Object.keys(djAuto)])].map(Number);
  engine.setDj(keys);
  if(!silent)flash(keys.length?'DJ: '+keys.map(djName).join(' + ')
    +(Object.keys(djLatch).length?'  [latched: '+Object.keys(djLatch).map(k=>DJKEYS[k]).join(' ')+']':'')
    :'DJ off');
  dirty=true;
}
document.addEventListener('keyup',e=>{
  const c=e.code;
  if(DJCODE[c]!==undefined&&djHeld[DJCODE[c]]){
    const k=DJCODE[c]; delete djHeld[k];
    if(djRecStart[k]!==undefined){                     // close the recorded automation window
      const st=djRecStart[k]; delete djRecStart[k];
      const L2=S.arr.len;
      S.arr.events.push({t:fmod(st,L2),dj:k,dur:Math.max(0.25,posNow()-st)});
      flash('● dj '+djName(k)+' recorded into the arrangement');
      dirtySave=true;
    }
    djApply();
  }
  if(c==='Backspace'){eraseHold=null;muteHold=null;clearTimeout(delHoldTimer);}
  if(rPend[c]){
    const r=rPend[c];
    retroBuf[r.pi].push({t:r.ts,midi:r.midi,dur:Math.max(0.05,gridNow()-r.ts)});
    if(retroBuf[r.pi].length>96)retroBuf[r.pi].shift();
    delete rPend[c];
  }
  if((c==='Tab'||c==='Backquote')&&(CFG.looper||0)!==2){   // momentary release = rec off
    if(engine.audRec)engine.audRecStop();
    const h=curHolder();
    if(h.state==='rec'){h.state='on';finalizeCaptures(true);dirty=true;dirtySave=true;}
  }
  let relAt=AC.currentTime+0.005;
  if(pend[c]){
    const p=pend[c], lane=S.patterns[S.editPat].lanes[p.lane];
    /* length is measured from where the note SOUNDED (post-quantize), not from
       the raw keypress — so the loop plays back the note you actually heard */
    const relG=T.playing?gridNow():p.ts+0.25;
    const dur=Math.max(0.05,relG-p.ts);
    lane.clear(ev=>ev.midi===p.midi&&Math.abs(ev.t-p.qt)<1e-6);
    lane.events.push({t:p.qt,midi:p.midi,vel:0.9,dur,born:performance.now()});
    if(lane._cap)lane._cap.lastEnd=Math.max(lane._cap.lastEnd,p.qt+dur);
    relAt=Math.max(relAt,gridTime(p.ts+dur));   // hold the monitored note to that same length
    delete pend[c]; dirty=true; dirtySave=true;
  }
  if(nlive[c]!=null){liveMute[nlive[c]]=Math.max(0,liveMute[nlive[c]]-1);delete nlive[c];}
  if(liveV[c]){liveV[c]&&liveV[c].release&&liveV[c].release(relAt);delete liveV[c];}
});
window.addEventListener('blur',()=>{
  eraseHold=null;
  for(const c in liveV){liveV[c]&&liveV[c].release&&liveV[c].release(AC.currentTime);delete liveV[c];}
  for(const c in pend)delete pend[c];
});

const LS='ten-v1';
function serialize(){return JSON.stringify({v:12,bpm:T.bpm,metro:S.metro,hum:S.hum,grv:S.grv,octs:S.octs,master:S.master,dj:S.dj,arrOn:S.arrOn!==false,
  arr:S.arr,
  patterns:S.patterns.map(p=>({state:p.state==='edit'?'on':p.state,sw:p.sw||0,lanes:p.lanes})),
  presets:S.presets.map(p=>({...p,modLoop:p.modLoop.toJSON()}))});}
function convertV3Preset(sp,i){ // v3-and-earlier preset data -> v4 racks
  const p=basePreset(sp.name||('P'+i));
  const oct=sp.osc?.oct||0, det=sp.osc?.det||0, pdrop=sp.osc?.pdrop||0;
  if(sp.ops)sp.ops.forEach((op,j)=>{if(op)Object.assign(p.osc[j],op,{ph:0});});
  else if(sp.osc&&sp.osc.type!==undefined)p.osc[0].wav=sp.osc.type;
  p.osc[0].rat=(p.osc[0].rat||1)*Math.pow(2,oct);
  p.osc[0].fine=(p.osc[0].fine||0)+det;
  if(sp.amp)p.env[0]={dst:1,idx:1,amt:100,a:sp.amp.a,d:sp.amp.d,s:sp.amp.s,r:sp.amp.r};
  if(sp.flt)p.flt[0]={typ:[1,2,3][sp.flt.type]||1,frq:sp.flt.cut,q:sp.flt.res,gn:0};
  if(sp.fen&&Math.abs(sp.fen.amt)>0.01)
    p.env[1]={dst:3,idx:1,amt:Math.round(sp.fen.amt*100),a:sp.fen.a,d:sp.fen.d,s:sp.fen.s,r:sp.fen.r};
  if(pdrop)p.env[2]={dst:2,idx:1,amt:clamp(Math.round(pdrop/24*100),-200,200),a:0.001,d:0.07,s:0,r:0.05};
  [sp.lf1,sp.lf2].forEach((lf,j)=>{
    if(!lf||!lf.dst||lf.amt<0.001)return;
    p.lfo[j]={dst:[0,1,2,3][lf.dst]||0,idx:1,wav:lf.wav,rate:lf.rate,amt:Math.round(lf.amt*100)};
  });
  if(sp.dly&&sp.dly.send>0.01)p.fx[0]={typ:1,p1:0.27,p2:0.35,mix:sp.dly.send};
  if(sp.rev&&sp.rev.send>0.01)p.fx[1]={typ:8,p1:sp.rev.send,p2:0,mix:1};
  if(sp.vox)Object.assign(p.vox,sp.vox);
  if(sp.mix)Object.assign(p.mix,sp.mix);
  return p;
}
function load(json){
  try{
    const o=JSON.parse(json); if(!o||o.v<1||o.v>12)return false;
    T.bpm=o.bpm||120; S.metro=!!o.metro; S.hum=o.hum??0;
    S.grv=o.grv||{typ:0,amt:0};
    if(Array.isArray(o.master))S.master=o.master.map((m,i)=>({typ:0,rt:0,p1:0.3,p2:0.3,p3:0.5,mix:0.3,...m}));
    if(o.v<9&&S.master[9]&&!S.master[9].typ)S.master[9]={typ:15,rt:0,p1:0.85,p2:0.3,p3:0.5,mix:0};
    S.octs=Array.isArray(o.octs)?o.octs.slice(0,10):Array.from({length:10},()=>0);
    S.arr=Looper.from(o.arr); S.arr.auto=false; S.arrOn=o.arrOn!==false;
    if(o.v>=2){
      S.patterns=o.patterns.map(sp=>{
        const p=mkPattern(); p.state='on'; p.sw=sp.sw||0;
        p.lanes=sp.lanes.map(Looper.from);
        if(o.v<6)p.lanes.forEach(l=>{if(!l.qpost)l.qpost=1;});   // post-Q default became 100%
        return p;});
    }else{
      S.patterns=o.patterns.map(sp=>{
        const p=mkPattern();
        for(const e of (sp.events||[])){
          const li=e.preset??0;
          p.lanes[li].unit=sp.unit; p.lanes[li].count=sp.count; p.lanes[li].auto=false;
          p.lanes[li].events.push({t:e.t,midi:e.midi,vel:e.vel,dur:e.dur});
        }
        return p;});
    }
    if(o.v>=4){
      S.presets=o.presets.map((sp,i)=>{
        const p=basePreset(sp.name||('P'+i));
        for(const M of MODULES){
          if(!M.id)continue;
          if(M.flat){if(sp[M.id])Object.assign(p[M.id],sp[M.id]);}
          else if(Array.isArray(sp[M.id]))sp[M.id].forEach((sl,j)=>{if(sl)Object.assign(p[M.id][j],sl);});
        }
        p.name=sp.name;
        p.cat=sp.cat||(['kik','snr','hh','perc','bass','keys','chord','lead','pad','plk'][i]||'misc');
        p.tr=sp.tr||0; p.prep=sp.prep||null;
        p.au=Object.assign({gain:0.9,semis:0,rate:1,st:0,en:1,fit:0,src:0},sp.au||{});
        if(sp.stk&&sp.stk.layers)p.stk={on:sp.stk.on||0,mode:sp.stk.mode||0,sel:sp.stk.sel||0,layers:sp.stk.layers};
        p.modLoop=Looper.from(sp.modLoop||{unit:'b',count:8}); p.modLoop.auto=false;
        if(o.v===4){  // module order changed in v5: ply 6->9, vox 8->7, mix 9->8
          const map={6:9,8:7,9:8};
          p.modLoop.events=p.modLoop.events
            .filter(ev=>ev.m!==7)
            .map(ev=>({...ev,m:map[ev.m]??ev.m}));
        }
        if(o.v<7){    // v7 inserted PRESET at module 1: osc..fx shift up one
          p.modLoop.events=p.modLoop.events
            .filter(ev=>ev.m!==6)
            .map(ev=>({...ev,m:ev.m<6?ev.m+1:ev.m}));
        }
        return p;});
    }else{
      S.presets=o.presets.map((sp,i)=>{
        const p=convertV3Preset(sp,i);
        p.modLoop=Looper.from(sp.modLoop||{unit:'b',count:8});
        p.modLoop.events=[];         // mod-loop address format changed in v4
        p.modLoop.auto=false;
        return p;});
    }
    if(o.v<10)S.presets.forEach(p=>{
      p.ply.forEach(sl=>{
        if(sl.typ===2)sl.p1=[0,3,6,9][clamp(Math.round(sl.p1||0),0,3)];  // arp divs gained ./T variants
        if(sl.p4===undefined)sl.p4=60;
      });
      if(p.cat==='drum')p.cat=drumCatOf(p);          // drum split into subtypes
    });
    S.dj=DJ0().map((d2,i)=>Object.assign(d2,(o.dj&&o.dj[i])||{}));
    if(o.v<11){                                       // dj pads became indexed editable slots
      const KM={a:0,s:1,d:2,h:3,j:4,k:5,l:6,';':7,"'":8,w:9};
      S.arr.events.forEach(ev=>{if(typeof ev.dj==='string')ev.dj=KM[ev.dj]??0;});
    }
    for(let i=0;i<10;i++){engine.rebuildRack(i);engine.refresh(i);}
    engine.rebuildMaster();
    return true;
  }catch(err){console.warn('load failed',err);return false;}
}

function stateBadge(st){
  return st==='rec'?sp('ri',' REC '):st==='edit'?sp('i',' EDIT '):sp('ai',' PLAY ');

function loopBadge(){
  const h=curHolder(), lp=curLoop();
  const cnt=(lp.count%1?lp.count.toFixed(2):lp.count)+'';
  const lane=S.layer===1?sp('d',' lane ')+sp('a',S.curPreset+pad(S.presets[S.curPreset].name,5))+' ':' ';
  const len=lp._cap?sp('r','listening…'):sp('a',cnt+'×'+UNIT_NAMES[lp.unit])+sp('d',' ('+(Math.round(lp.len*100)/100)+'b)');
  return stateBadge(h.state)+lane+len;
}
function gridRow(lp,cell,phCell,charFor,cur=-1){
  const n=Math.ceil(lp.len/cell-1e-9);
  let out='';
  for(let i=0;i<n;i++){
    const ch=charFor(i*cell,(i+1)*cell);
    out+=(i===cur)?sp('i',ch):(i===phCell)?sp('ai',ch):ch;
    if(cell<1&&i%4===3&&i<n-1)out+=sp('d','│');
    else if(cell>=1&&(i+1)*cell%4===0&&i<n-1)out+=sp('d','│');
  }
  return out;
}

/* param display: when a note is focused, show its EFFECTIVE value in place,
   with a • marking params that carry a per-note override */
function stackStrip(L,p){            // visual row of layers when stacking is on
  if(!p.stk||!p.stk.on)return;
  const sel=p.stk.sel, mode=p.stk.mode?'split':'stack';
  let row='   '+sp('d',pad(mode,7));
  const cell=(i,lbl,mut)=>i===sel?sp('i',' '+lbl+' '):(mut?sp('d',' '+lbl+' '):sp('a',' '+lbl+' '));
  row+=cell(0,'L1 '+p.name,0);      // L1 IS the channel sound (no separate "base")
  p.stk.layers.forEach((Ly,i)=>{
    const z=p.stk.mode?_zn(Ly.lo)+'–'+_zn(Ly.hi):Math.round(Ly.lvl*100)+'%';
    row+=cell(i+1,'L'+(i+2)+' '+Ly.name+(Ly.mute?'×':'')+' '+z,Ly.mute);
  });
  L.push(row);
}
/* which sound a layer edit is landing on, shown in the sound view */
function layerBanner(L,pre){
  if(!pre.stk||!pre.stk.on)return;
  const sel=pre.stk.sel, M=MODULES[S.curMod];
  const name=sel===0?pre.name:(pre.stk.layers[sel-1]||{}).name;
  const num='L'+(sel+1);
  if(M.prs)return;
  if(LAYERMODS.has(M.id))
    L.push('  '+sp('r','◆ editing '+num)+sp('a',' '+name)+sp('d',' — this layer only (⇧digit or PRST layer field to switch)'));
  else
    L.push('  '+sp('d','◆ '+M.name+' is channel-shared — applies to all layers'));
}
function prepDisp(pre,mi,si,spec){
  const holder=modHolder(pre,MODULES[mi].id);
  if(holder!==pre)return {v:getV(holder,mi,si,spec),dot:false};   // editing a layer
  const f=S.prepFocus;
  if(f==null||!pre.prep||!pre.prep.notes||!pre.prep.notes[f])
    return {v:getV(pre,mi,si,spec),dot:false};
  const node=pre.prep.notes[f];
  const key=MODULES[mi].id+':'+(MODULES[mi].flat?'-':si)+':'+spec.key;
  return {v:getV(prepEffective(pre,f),mi,si,spec),dot:!!(node.k&&node.k[key]!==undefined)};
}
function prepLine(L,pre){
  const kit=pre.cat==='kit';
  const anyPrep=pre.prep&&pre.prep.notes&&Object.keys(pre.prep.notes).length;
  if(!kit&&!anyPrep)return;
  const f=S.prepFocus;
  const has=f!=null&&pre.prep&&pre.prep.notes&&pre.prep.notes[f];
  L.push('  '+sp('r','◆ '+(kit?'KIT':'PREP'))+
    sp('d','  note: ')+(f!=null?sp('a',NN[f%12]+(Math.floor(f/12)-1)+(has?' ●':'')):sp('d','play a note'))+
    sp('d','  ·  shift+↑↓ tweaks this note only (• marks it) · ⌫ removes'+
      (kit?' · PRST shows its sound':'')));
  L.push('');
}

  });
  L.push(tabs);

      sum+=(i===S.curSlot?sp('a',seg):sp('d',seg));

  }else if(M.id==='lfo'){
    rackA.forEach((e2,i)=>{
      if(!e2.dst)return;

      sum+=(i===S.curSlot?sp('a',seg):sp('d',seg));

    rackA.forEach((s2,i)=>{

      sum+=(i===S.curSlot?sp('a','  '+((i+1)%10)+ab):sp('d','  '+((i+1)%10)+ab));
    });

  L.push(sum);
  L.push('');
  // mod loop, scoped to this slot (dim dots = other slots of this module)

  L.push('  '+sp('d','mod loop (slot '+((S.curSlot+1)%10)+'): '+evSlot.length+' pts · module '+evMod.length+
    (ml.state==='rec'?'  ● value moves record':'')+'  ·  ⇧⌫ clear slot pts'));
  L.push('   '+gridRow(ml,cellM,phM,(a,b)=>
    evSlot.some(e=>e.t>=a-1e-9&&e.t<b-1e-9)?'▪':

  if(mEdit)L.push('  '+sp('i',' EDIT ')+' '+sp('a',(curCell(ml)+1)+'/'+stepCells(ml))+

  const hints={osc:'dest routes fm/ring at any op · phase + trig: rtrg = locked start, free = analog-style random',
    amp:'route: ser = in chain, par = side-branch summed in',

    fx:'serial chain top to bottom · verb = send to shared reverb',
    ply:'chord (±strum: + low→high, − high→low) · arp needs transport · grv = this part’s groove'};
  L.push('   '+sp('d','←→ flows params → next slot · shift+←→ jumps slot · digits pick slot · ↑↓ value'));

    ['[  ]  \\  - =','loop half / double+dup / unit / ±1 unit (arrange+pattern)'],
    ['←→ / ↑↓ (in arrange)','groove · amount · humanize · switch mode — params on the arrows'],
    [', .','bpm −1/+1 (shift = ±10) · m metronome'],
    ['cmd/ctrl+Z / +shift+Z','undo / redo — takes, clears, tweaks, preset loads, randomize'],
    [', . (in pattern)','channel volume −/+ (shift = bpm as usual)'],
    ['esc (from arrange)','SETTINGS: looper momentary/latch · overdub · listen · scale/key/mode'],
    ['0 0 (in arrange)','first 0 selects pattern 0 · 0 again opens MASTER (fx rack + dj pad editor)'],
    ['PLAY slot: prep/kit','per-note tweaks (prepared synth) or per-note sounds (kit) — normal by default'],
    ['ctrl/cmd+E','export session json · drop a json file anywhere to load'],
  ];
  for(const [k,d] of rows)L.push('   '+sp('a',pad(k,34))+' '+sp('d',d));
}

let lastR=0, lastF=0, cpuLoad=0;
(function raf(t){
  requestAnimationFrame(raf);
  if(lastF){                       // main-thread load: how far frames stretch past 60fps
    const gap=t-lastF;
    if(gap<500)cpuLoad=cpuLoad*0.95+clamp((gap-17)/17,0,1)*100*0.05;
  }
  lastF=t;
  eraseSweep();
  if(T.playing)finalizeCaptures(false);
  if(!T.playing&&t-lastR>250)dirty=true;   // keep the cpu meter live while idle
  if((T.playing||dirty)&&t-lastR>33){lastR=t;dirty=false;render();}
})(0);
</script>
